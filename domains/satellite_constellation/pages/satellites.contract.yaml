apiVersion: specora.dev/v1
kind: Page
metadata:
  name: satellites
  domain: satellite_constellation
  description: "Browse and manage satellites"
  tags: [satellite, ui]
requires:
  - entity/satellite_constellation/satellite
spec:
  route: /satellites
  title: Satellites
  entity: entity/satellite_constellation/satellite
  generation_tier: mechanical
  data_sources:
    - endpoint: /satellites
      alias: satellites
  views:
    - type: kanban
      default: true
      card_fields: [designation, orbit_type, altitude_km, battery_level, signal_strength]
    - type: table
      columns: [name, designation, orbit_type, altitude_km, battery_level, signal_strength, is_active]
