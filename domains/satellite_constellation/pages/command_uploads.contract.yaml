apiVersion: specora.dev/v1
kind: Page
metadata:
  name: command_uploads
  domain: satellite_constellation
  description: "Browse and manage command uploads"
  tags: [satellite, command, ui]
requires:
  - entity/satellite_constellation/command_upload
spec:
  route: /command-uploads
  title: Command Uploads
  entity: entity/satellite_constellation/command_upload
  generation_tier: mechanical
  data_sources:
    - endpoint: /command-uploads
      alias: command_uploads
  views:
    - type: kanban
      default: true
      card_fields: [satellite_id, command_type, priority]
    - type: table
      columns: [satellite_id, command_type, priority, uploaded_by, response_code, executed_at]
