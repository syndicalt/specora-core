apiVersion: specora.dev/v1
kind: Route
metadata:
  name: anomalies
  domain: satellite_constellation
  description: "CRUD API for anomalies"
  tags: [satellite, anomaly, api]
requires:
  - entity/satellite_constellation/anomaly
spec:
  entity: entity/satellite_constellation/anomaly
  base_path: /anomalies
  endpoints:
    - method: GET
      path: /
      summary: List anomalies
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create anomaly
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get anomaly
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update anomaly
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete anomaly
      response: {status: 204}
