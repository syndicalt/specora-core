apiVersion: specora.dev/v1
kind: Route
metadata:
  name: telemetry_downloads
  domain: satellite_constellation
  description: "CRUD API for telemetry downloads"
  tags: [satellite, telemetry, api]
requires:
  - entity/satellite_constellation/telemetry_download
spec:
  entity: entity/satellite_constellation/telemetry_download
  base_path: /telemetry-downloads
  endpoints:
    - method: GET
      path: /
      summary: List telemetry downloads
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create telemetry download
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get telemetry download
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update telemetry download
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete telemetry download
      response: {status: 204}
