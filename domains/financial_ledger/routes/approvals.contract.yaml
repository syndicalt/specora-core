apiVersion: specora.dev/v1
kind: Route
metadata:
  name: approvals
  domain: financial_ledger
  description: "CRUD API for approvals"
  tags: [finance, ledger]
requires:
  - entity/financial_ledger/approval
  - workflow/financial_ledger/approval_flow
spec:
  entity: entity/financial_ledger/approval
  base_path: /approvals
  endpoints:
    - method: GET
      path: /
      summary: List approvals
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create approval
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get approval
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update approval
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete approval
      response: {status: 204}
    - method: PUT
      path: /{id}/state
      summary: Transition approval state
      request_body: {required_fields: [state]}
      response: {status: 200, shape: entity}
