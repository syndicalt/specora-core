apiVersion: specora.dev/v1
kind: Route
metadata:
  name: journals
  domain: financial_ledger
  description: "CRUD API for journal entries"
  tags: [finance, ledger]
requires:
  - entity/financial_ledger/journal
  - workflow/financial_ledger/journal_lifecycle
spec:
  entity: entity/financial_ledger/journal
  base_path: /journals
  endpoints:
    - method: GET
      path: /
      summary: List journals
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create journal
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get journal
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update journal
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete journal
      response: {status: 204}
    - method: PUT
      path: /{id}/state
      summary: Transition journal state
      request_body: {required_fields: [state]}
      response: {status: 200, shape: entity}
