apiVersion: specora.dev/v1
kind: Route
metadata:
  name: projects
  domain: task_manager
  description: "CRUD API for projects"

requires:
  - entity/task_manager/project

spec:
  entity: entity/task_manager/project
  base_path: /projects
  endpoints:
    - method: GET
      path: /
      summary: List all projects
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create a new project
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get a project by ID
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update a project
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete a project
      response: {status: 204}
