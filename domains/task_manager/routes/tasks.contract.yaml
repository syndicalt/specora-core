apiVersion: specora.dev/v1
kind: Route
metadata:
  name: tasks
  domain: task_manager
  description: "CRUD API for tasks with state transitions"

requires:
  - entity/task_manager/task
  - workflow/task_manager/task_lifecycle

spec:
  entity: entity/task_manager/task
  base_path: /tasks
  endpoints:
    - method: GET
      path: /
      summary: List all tasks
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create a new task
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get a task by ID
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update a task
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete a task
      response: {status: 204}
    - method: PUT
      path: /{id}/state
      summary: Transition task state
      request_body: {required_fields: [state]}
      response: {status: 200, shape: entity}
