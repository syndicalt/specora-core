apiVersion: specora.dev/v1
kind: Route
metadata:
  name: comments
  domain: task_manager
  description: "CRUD API for comments"

requires:
  - entity/task_manager/comment

spec:
  entity: entity/task_manager/comment
  base_path: /comments
  endpoints:
    - method: GET
      path: /
      summary: List all comments
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create a comment
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get a comment by ID
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete a comment
      response: {status: 204}
