apiVersion: specora.dev/v1
kind: Route
metadata:
  name: users
  domain: task_manager
  description: "CRUD API for users"

requires:
  - entity/task_manager/user

spec:
  entity: entity/task_manager/user
  base_path: /users
  endpoints:
    - method: GET
      path: /
      summary: List all users
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create a new user
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get a user by ID
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update a user
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete a user
      response: {status: 204}
