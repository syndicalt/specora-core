apiVersion: specora.dev/v1
kind: Entity
metadata:
  name: project
  domain: task_manager
  description: "A project that groups related tasks together"
  tags: [organization, core]

requires:
  - mixin/stdlib/timestamped
  - mixin/stdlib/identifiable
  - entity/task_manager/user

spec:
  icon: folder
  number_prefix: PRJ
  fields:
    name:
      type: string
      required: true
      description: "Project name"
      constraints:
        maxLength: 200
    description:
      type: text
      description: "Detailed project description"
    owner_id:
      type: uuid
      required: true
      description: "User who owns this project"
      references:
        entity: entity/task_manager/user
        display: name
        graph_edge: OWNED_BY
    status:
      type: string
      required: true
      enum: [active, archived, completed]
      description: "Project status"
    due_date:
      type: date
      description: "Project deadline"
    color:
      type: string
      description: "UI color code for the project"
  mixins:
    - mixin/stdlib/timestamped
    - mixin/stdlib/identifiable
