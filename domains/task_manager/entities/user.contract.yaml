apiVersion: specora.dev/v1
kind: Entity
metadata:
  name: user
  domain: task_manager
  description: "A user who can be assigned tasks and manage projects"
  tags: [identity, core]

requires:
  - mixin/stdlib/timestamped
  - mixin/stdlib/identifiable

spec:
  icon: user
  number_prefix: USR
  fields:
    name:
      type: string
      required: true
      description: "Full name of the user"
      constraints:
        maxLength: 200
    email:
      type: email
      required: true
      description: "Email address"
    role:
      type: string
      required: true
      enum: [admin, manager, member, viewer]
      description: "User role for access control"
    avatar_url:
      type: string
      description: "URL to profile picture"
    active:
      type: boolean
      default: true
      description: "Whether the account is active"
  mixins:
    - mixin/stdlib/timestamped
    - mixin/stdlib/identifiable
