apiVersion: specora.dev/v1
kind: Route
metadata:
  name: users
  domain: devops_pipeline
  description: "CRUD API for platform users"
  tags: [devops, api, user]
requires:
  - entity/devops_pipeline/user
spec:
  entity: entity/devops_pipeline/user
  base_path: /users
  endpoints:
    - method: GET
      path: /
      summary: List all users
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create a new user
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get user details
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update user
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Deactivate a user
      response: {status: 204}
