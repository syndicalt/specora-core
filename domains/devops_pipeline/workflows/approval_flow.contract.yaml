apiVersion: specora.dev/v1
kind: Workflow
metadata:
  name: approval_flow
  domain: devops_pipeline
  description: "Approval gate decision workflow"
  tags: [devops, approval]
requires: []
spec:
  initial: pending
  states:
    pending:
      label: Pending Review
      category: open
    approved:
      label: Approved
      category: closed
      terminal: true
    rejected:
      label: Rejected
      category: closed
      terminal: true
  transitions:
    pending: [approved, rejected]
  guards:
    "pending -> approved":
      require_fields: [approver, comment]
    "pending -> rejected":
      require_fields: [approver, comment]
  side_effects:
    "pending -> approved":
      - set_field: {decided_at: "now"}
    "pending -> rejected":
      - set_field: {decided_at: "now"}
