apiVersion: specora.dev/v1
kind: Page
metadata:
  name: escrows
  domain: marketplace
  description: "Browse and manage escrows"
  tags: [marketplace]
requires:
  - entity/marketplace/escrow
spec:
  route: /escrows
  title: Escrows
  entity: entity/marketplace/escrow
  generation_tier: mechanical
  data_sources:
    - endpoint: /escrows
      alias: escrows
  views:
    - type: kanban
      default: true
      card_fields: [transaction_id, amount_cents]
    - type: table
      columns: [transaction_id, amount_cents, held_at, released_at, release_reason]
