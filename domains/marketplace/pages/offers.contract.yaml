apiVersion: specora.dev/v1
kind: Page
metadata:
  name: offers
  domain: marketplace
  description: "Browse and manage offers"
  tags: [marketplace]
requires:
  - entity/marketplace/offer
spec:
  route: /offers
  title: Offers
  entity: entity/marketplace/offer
  generation_tier: mechanical
  data_sources:
    - endpoint: /offers
      alias: offers
  views:
    - type: kanban
      default: true
      card_fields: [listing_id, buyer_id, amount_cents, counter_amount_cents]
    - type: table
      columns: [listing_id, buyer_id, seller_id, amount_cents, counter_amount_cents, expires_at]
