apiVersion: specora.dev/v1
kind: Route
metadata:
  name: sellers
  domain: marketplace
  description: "CRUD API for sellers"
  tags: [marketplace]
requires:
  - entity/marketplace/seller
spec:
  entity: entity/marketplace/seller
  base_path: /sellers
  endpoints:
    - method: GET
      path: /
      summary: List sellers
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create seller
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get seller
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update seller
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete seller
      response: {status: 204}
