apiVersion: specora.dev/v1
kind: Route
metadata:
  name: escrows
  domain: marketplace
  description: "CRUD API for escrows"
  tags: [marketplace]
requires:
  - entity/marketplace/escrow
  - workflow/marketplace/escrow_lifecycle
spec:
  entity: entity/marketplace/escrow
  base_path: /escrows
  endpoints:
    - method: GET
      path: /
      summary: List escrows
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create escrow
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get escrow
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update escrow
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete escrow
      response: {status: 204}
    - method: PUT
      path: /{id}/state
      summary: Transition escrow state
      request_body: {required_fields: [state]}
      response: {status: 200, shape: entity}
