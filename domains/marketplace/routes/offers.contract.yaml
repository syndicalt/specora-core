apiVersion: specora.dev/v1
kind: Route
metadata:
  name: offers
  domain: marketplace
  description: "CRUD API for offers"
  tags: [marketplace]
requires:
  - entity/marketplace/offer
  - workflow/marketplace/offer_negotiation
spec:
  entity: entity/marketplace/offer
  base_path: /offers
  endpoints:
    - method: GET
      path: /
      summary: List offers
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create offer
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get offer
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update offer
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete offer
      response: {status: 204}
    - method: PUT
      path: /{id}/state
      summary: Transition offer state
      request_body: {required_fields: [state]}
      response: {status: 200, shape: entity}
