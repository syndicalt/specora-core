apiVersion: specora.dev/v1
kind: Route
metadata:
  name: listings
  domain: marketplace
  description: "CRUD API for listings"
  tags: [marketplace]
requires:
  - entity/marketplace/listing
  - workflow/marketplace/listing_lifecycle
spec:
  entity: entity/marketplace/listing
  base_path: /listings
  endpoints:
    - method: GET
      path: /
      summary: List listings
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create listing
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get listing
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update listing
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete listing
      response: {status: 204}
    - method: PUT
      path: /{id}/state
      summary: Transition listing state
      request_body: {required_fields: [state]}
      response: {status: 200, shape: entity}
