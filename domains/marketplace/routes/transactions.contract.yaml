apiVersion: specora.dev/v1
kind: Route
metadata:
  name: transactions
  domain: marketplace
  description: "CRUD API for transactions"
  tags: [marketplace]
requires:
  - entity/marketplace/transaction
  - workflow/marketplace/transaction_flow
spec:
  entity: entity/marketplace/transaction
  base_path: /transactions
  endpoints:
    - method: GET
      path: /
      summary: List transactions
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create transaction
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get transaction
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update transaction
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete transaction
      response: {status: 204}
    - method: PUT
      path: /{id}/state
      summary: Transition transaction state
      request_body: {required_fields: [state]}
      response: {status: 200, shape: entity}
