apiVersion: specora.dev/v1
kind: Route
metadata:
  name: buyers
  domain: marketplace
  description: "CRUD API for buyers"
  tags: [marketplace]
requires:
  - entity/marketplace/buyer
spec:
  entity: entity/marketplace/buyer
  base_path: /buyers
  endpoints:
    - method: GET
      path: /
      summary: List buyers
      response: {status: 200, shape: list}
    - method: POST
      path: /
      summary: Create buyer
      auto_fields: {id: uuid, created_at: now}
      response: {status: 201, shape: entity}
    - method: GET
      path: /{id}
      summary: Get buyer
      response: {status: 200, shape: entity}
    - method: PATCH
      path: /{id}
      summary: Update buyer
      response: {status: 200, shape: entity}
    - method: DELETE
      path: /{id}
      summary: Delete buyer
      response: {status: 204}
