apiVersion: specora.dev/v1
kind: Workflow
metadata:
  name: task_lifecycle
  domain: todo_list
  description: This workflow defines the lifecycle of a task from its initial to-do
    state through in-progress to either done or cancelled states.
requires: []
spec:
  initial: todo
  states:
    todo:
      label: To Do
      category: open
      terminal: false
    in_progress:
      label: In Progress
      category: open
      terminal: false
    done:
      label: Done
      category: closed
      terminal: true
    cancelled:
      label: Cancelled
      category: closed
      terminal: true
  transitions:
    todo:
    - in_progress
    in_progress:
    - done
    - cancelled
