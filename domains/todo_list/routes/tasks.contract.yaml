apiVersion: specora.dev/v1
kind: Route
metadata:
  name: tasks
  domain: todo_list
  description: CRUD API for Tasks
requires:
- entity/todo_list/task
- workflow/todo_list/task_lifecycle
spec:
  entity: entity/todo_list/task
  base_path: /Tasks
  endpoints:
  - method: GET
    path: /
    summary: List all Tasks
    response:
      status: 200
      shape: list
  - method: POST
    path: /
    summary: Create a new Task
    auto_fields:
      id: uuid
      created_at: now
    response:
      status: 201
      shape: entity
  - method: GET
    path: /{id}
    summary: Get a Task by ID
    response:
      status: 200
      shape: entity
  - method: PATCH
    path: /{id}
    summary: Update a Task
    response:
      status: 200
      shape: entity
  - method: DELETE
    path: /{id}
    summary: Delete a Task
    response:
      status: 204
  - method: PUT
    path: /{id}/state
    summary: Transition Task state
    request_body:
      required_fields:
      - state
    response:
      status: 200
      shape: entity
