apiVersion: specora.dev/v1
kind: Page
metadata:
  name: users
  domain: todo_list
  description: Browse and manage Users
requires:
- entity/todo_list/user
spec:
  route: /Users
  title: Users
  entity: entity/todo_list/user
  generation_tier: mechanical
  data_sources:
  - endpoint: /Users
    alias: Users
  views:
  - type: table
    default: true
    columns:
    - name
    - email
  - type: kanban
    card_fields:
    - name
    - email
