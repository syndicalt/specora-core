apiVersion: specora.dev/v1
kind: Page
metadata:
  name: todo_lists
  domain: todo_list
  description: Browse and manage TodoLists
requires:
- entity/todo_list/todo_list
spec:
  route: /TodoLists
  title: Todolists
  entity: entity/todo_list/todo_list
  generation_tier: mechanical
  data_sources:
  - endpoint: /TodoLists
    alias: TodoLists
  views:
  - type: table
    default: true
    columns:
    - number
    - short_description
    - description
    - assigned_to
  - type: kanban
    card_fields:
    - number
    - short_description
    - description
    - assigned_to
