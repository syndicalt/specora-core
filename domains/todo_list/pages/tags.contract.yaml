apiVersion: specora.dev/v1
kind: Page
metadata:
  name: tags
  domain: todo_list
  description: Browse and manage Tags
requires:
- entity/todo_list/tag
spec:
  route: /Tags
  title: Tags
  entity: entity/todo_list/tag
  generation_tier: mechanical
  data_sources:
  - endpoint: /Tags
    alias: Tags
  views:
  - type: table
    default: true
    columns:
    - name
  - type: kanban
    card_fields:
    - name
