apiVersion: specora.dev/v1
kind: Page
metadata:
  name: tasks
  domain: todo_list
  description: Browse and manage Tasks
requires:
- entity/todo_list/task
spec:
  route: /Tasks
  title: Tasks
  entity: entity/todo_list/task
  generation_tier: mechanical
  data_sources:
  - endpoint: /Tasks
    alias: Tasks
  views:
  - type: table
    default: true
    columns:
    - title
    - description
    - due_date
    - status
    - assigned_to
    - number
  - type: kanban
    card_fields:
    - title
    - description
    - due_date
    - status
