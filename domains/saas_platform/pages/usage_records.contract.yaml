apiVersion: specora.dev/v1
kind: Page
metadata:
  name: usage_records
  domain: saas_platform
  description: "Browse and manage usage records"
  tags: [saas, enterprise]
requires:
  - entity/saas_platform/usage_record
spec:
  route: /usage-records
  title: Usage Records
  entity: entity/saas_platform/usage_record
  generation_tier: mechanical
  data_sources:
    - endpoint: /usage-records
      alias: usage_records
  views:
    - type: table
      default: true
      columns: [tenant_id, metric, quantity, recorded_at, billing_period]
