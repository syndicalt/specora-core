apiVersion: specora.dev/v1
kind: Page
metadata:
  name: domain_configs
  domain: saas_platform
  description: "Browse and manage domain configurations"
  tags: [saas, enterprise]
requires:
  - entity/saas_platform/domain_config
spec:
  route: /domain-configs
  title: Domain Configurations
  entity: entity/saas_platform/domain_config
  generation_tier: mechanical
  data_sources:
    - endpoint: /domain-configs
      alias: domain_configs
  views:
    - type: table
      default: true
      columns: [tenant_id, config_key, category, config_value, is_secret]
