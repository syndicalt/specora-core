apiVersion: specora.dev/v1
kind: Page
metadata:
  name: invites
  domain: saas_platform
  description: "Browse and manage invites"
  tags: [saas, enterprise]
requires:
  - entity/saas_platform/invite
spec:
  route: /invites
  title: Invites
  entity: entity/saas_platform/invite
  generation_tier: mechanical
  data_sources:
    - endpoint: /invites
      alias: invites
  views:
    - type: kanban
      default: true
      card_fields: [email, role, invited_by]
    - type: table
      columns: [tenant_id, email, role, invited_by, accepted_at, expires_at]
